server:
  port: 8081

spring:
  application:
    name: ticket-service
  datasource:
    url: jdbc:postgresql://localhost:5432/tessera_tickets
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
  security:
    oauth2:
      resourceserver:
        jwt:
          # Use jwk-set-uri (not issuer-uri) so we don't validate the `iss`
          # claim — Keycloak issues tokens with iss=http://localhost:8180
          # (host port) but inside Docker we reach it as http://keycloak:8180.
          jwk-set-uri: ${KEYCLOAK_JWKS_URI:http://keycloak:8180/realms/tessera/protocol/openid-connect/certs}
  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:localhost}
    port: ${SPRING_RABBITMQ_PORT:5672}
    username: ${SPRING_RABBITMQ_USERNAME:tessera}
    password: ${SPRING_RABBITMQ_PASSWORD:tessera}

# Tessera-specific event bus config.
tessera:
  # match-service base URL, used to resolve a match's home club when a club
  # manager opens a box office (authorization check in EventController).
  match-service:
    base-url: ${MATCH_SERVICE_URL:http://match-service:8082}
  events:
    exchange: tessera.events
  mbway:
    # mock-mbway (or the real SIBS gateway) polls us for pending payments —
    # we never call out to it directly, since it may be on a network we
    # can't reach (a phone on its own hotspot/mobile data). See
    # MbwayGatewayClient/MbwayRelayController.
    # Base URL the gateway uses to call our webhook back with the payment
    # result. Set MBWAY_WEBHOOK_BASE_URL=http://<host-lan-ip>:8081 for a LAN
    # demo, or the public HTTPS origin in prod.
    webhook-base-url: ${MBWAY_WEBHOOK_BASE_URL:http://host.docker.internal:8081}
    terminal-id: ${MBWAY_TERMINAL_ID:47215}
    # Shared secret the poller must present (X-Relay-Secret header) — the
    # poll endpoint is public once deployed, unlike the old LAN-only setup.
    relay-secret: ${MBWAY_RELAY_SECRET:}
  stripe:
    # Test-mode secret key from dashboard.stripe.com (Developers > API keys).
    secret-key: ${STRIPE_SECRET_KEY:}
    # Where Stripe sends the buyer back after Checkout. {id}/{eventId} are
    # filled in by StripeGatewayClient — Stripe only auto-substitutes its own
    # {CHECKOUT_SESSION_ID} placeholder.
    success-url: ${STRIPE_SUCCESS_URL:http://localhost:8000/events/{eventId}?stripe_ticket_id={id}}
    cancel-url: ${STRIPE_CANCEL_URL:http://localhost:8000/events/{eventId}?stripe_cancelled=1}
  google-wallet:
    # From pay.google.com/business/console — identifies our Wallet issuer account.
    issuer-id: ${GOOGLE_WALLET_ISSUER_ID:}
    # Service account JSON key (Cloud Console > IAM > Service Accounts),
    # Base64-encoded into a single line so it fits the same .env pattern as
    # every other secret here — never checked in as a file.
    service-account-json-base64: ${GOOGLE_WALLET_SERVICE_ACCOUNT_JSON_BASE64:}
