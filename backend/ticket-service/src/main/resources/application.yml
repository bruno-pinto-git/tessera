server:
  port: 8081

spring:
  application:
    name: ticket-service
  datasource:
    url: jdbc:postgresql://localhost:5432/tessera_tickets
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
  security:
    oauth2:
      resourceserver:
        jwt:
          # Use jwk-set-uri (not issuer-uri) so we don't validate the `iss`
          # claim — Keycloak issues tokens with iss=http://localhost:8180
          # (host port) but inside Docker we reach it as http://keycloak:8180.
          jwk-set-uri: ${KEYCLOAK_JWKS_URI:http://keycloak:8180/realms/tessera/protocol/openid-connect/certs}
  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:localhost}
    port: ${SPRING_RABBITMQ_PORT:5672}
    username: ${SPRING_RABBITMQ_USERNAME:tessera}
    password: ${SPRING_RABBITMQ_PASSWORD:tessera}

# Tessera-specific event bus config.
tessera:
  # match-service base URL, used to resolve a match's home club when a club
  # manager opens a box office (authorization check in EventController).
  match-service:
    base-url: ${MATCH_SERVICE_URL:http://match-service:8082}
  events:
    exchange: tessera.events
  mbway:
    # URL of the MB WAY gateway the ticket-service calls when a customer
    # picks MB WAY as payment method. Override at deploy time with
    # MBWAY_GATEWAY_URL=http://<device-ip>:8443 — typically the LAN IP of
    # the phone running the mock-mbway app, or in prod the real SIBS host.
    gateway-url: ${MBWAY_GATEWAY_URL:http://host.docker.internal:8443}
    # Base URL the gateway uses to call our webhook back. From inside the
    # gateway (running on a phone on the LAN), that means our LAN-reachable
    # IP — not host.docker.internal. Set MBWAY_WEBHOOK_BASE_URL=http://<host-lan-ip>:8081.
    webhook-base-url: ${MBWAY_WEBHOOK_BASE_URL:http://host.docker.internal:8081}
    terminal-id: ${MBWAY_TERMINAL_ID:47215}
    client-id: ${MBWAY_CLIENT_ID:tessera-mock}
