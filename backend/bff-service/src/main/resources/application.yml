server:
  port: 8080

spring:
  application:
    name: bff-service
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${KEYCLOAK_JWKS_URI:http://keycloak:8180/realms/tessera/protocol/openid-connect/certs}

# Internal service URLs
services:
  ticket-url: http://localhost:8081
  match-url: http://localhost:8082
  statistics-url: http://localhost:8083

# OpenAPI / Swagger UI — the UI displays our hand-written spec (swagger-ui.url),
# not one generated from controllers. The spec at /static/api/openapi.yaml is
# produced by `npm run bundle:bff` in docs/api/.
# NOTE: api-docs must stay ENABLED. In springdoc 2.x the Swagger UI config is
# @ConditionalOnBean(SpringDocConfiguration), and that bean only exists when
# springdoc.api-docs.enabled=true. Disabling it silently drops the whole UI
# (/api/docs + /swagger-ui/** 404), leaving only the static /api/openapi.yaml.
springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    path: /api/docs
    url: /api/openapi.yaml
    disable-swagger-default-url: true
