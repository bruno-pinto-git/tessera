          maximum: 99
        photoUrl:
          type:
            - string
            - 'null'
          format: uri
        dominantFoot:
          oneOf:
            - $ref: '#/components/schemas/dominantFoot'
            - type: 'null'
        height:
          type:
            - integer
            - 'null'
