        teamId:
          type: integer
          format: int64
          description: Identifier of the team the player belongs to.
          examples:
            - 1
        firstName:
          type: string
          minLength: 1
          maxLength: 100
          examples:
            - João
        lastName:
          type: string
          minLength: 1
          maxLength: 100
          examples:
            - Silva
        birthdate:
          type:
            - string
            - 'null'
          format: date
          description: Date of birth (ISO 8601 date).
          examples:
            - '1998-03-12'
        nationality:
          type:
            - string
            - 'null'
