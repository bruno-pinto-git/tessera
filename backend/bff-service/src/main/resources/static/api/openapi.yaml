    dominantFoot:
      type: string
      description: Player's dominant foot.
      enum:
        - LEFT
        - RIGHT
        - BOTH
      examples:
        - RIGHT
    playerStatus:
      type: string
      description: |
        Player's current availability status.
          - ACTIVE: available for selection
          - INJURED: out due to injury
          - SUSPENDED: serving a suspension
      enum:
        - ACTIVE
        - INJURED
        - SUSPENDED
      examples:
        - ACTIVE
    player:
      type: object
      description: |
        A player belonging to a team. Soft-deleted to preserve historical
