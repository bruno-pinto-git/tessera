        name:
          type: string
          minLength: 2
          maxLength: 200
          description: Name of the venue.
          examples:
            - Estádio do SU 1.º Dezembro
        capacity:
          type: integer
          format: int32
          minimum: 0
          maximum: 200000
          description: Total capacity (seated + standing).
          examples:
