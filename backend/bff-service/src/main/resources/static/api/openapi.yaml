  /matches/{id}/sheet/occurrences:
    parameters:
      - in: path
        name: id
        required: true
        schema:
          type: integer
          format: int64
          minimum: 1
        description: Identifier of the match.
    post:
      operationId: addOccurrence
      tags:
        - Match sheets
      summary: Add an occurrence to the match sheet
      description: |
        Appends a new occurrence (goal, card, substitution) to the match sheet.
        Validates that:
          - sheet is not locked AND match status ∈ {SCHEDULED, LIVE}
          - player is in the lineup
          - SUBSTITUTION requires `replacedPlayerId` and both players in same team
          - non-SUBSTITUTION must NOT include `replacedPlayerId`
        Requires `staff` or `admin`.
      x-required-roles:
        - staff
        - admin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/occurrenceCreateRequest'
            example:
              minute: 34
              type: GOAL
              playerId: 2
      responses:
        '201':
          description: Occurrence appended.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/occurrence'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /matches/{id}/sheet/occurrences/{occId}:
    parameters:
      - in: path
        name: id
        required: true
        schema:
          type: integer
          format: int64
          minimum: 1
        description: Identifier of the match.
      - in: path
        name: occId
        required: true
        schema:
          type: integer
          format: int64
          minimum: 1
        description: Identifier of the occurrence to remove.
    delete:
      operationId: removeOccurrence
      tags:
        - Match sheets
      summary: Remove an occurrence from the match sheet
      description: |
        Hard-deletes the occurrence. Allowed only while the sheet is unlocked and
        the match status allows edits. Requires `staff` or `admin`.
      x-required-roles:
        - staff
        - admin
      responses:
        '204':
          description: Occurrence removed.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /matches/{id}/sheet/lock:
    parameters:
      - in: path
        name: id
        required: true
        schema:
          type: integer
          format: int64
          minimum: 1
        description: Identifier of the match.
    post:
      operationId: lockMatchSheet
      tags:
        - Match sheets
      summary: Lock the match sheet
      description: |
        Marks the match sheet as locked, preventing further edits to the lineup
        or occurrences. Idempotent — locking an already-locked sheet is a no-op.
        Requires `staff` or `admin`.
      x-required-roles:
        - staff
        - admin
      responses:
        '200':
          description: Sheet locked.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/matchSheet'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /matches/{id}/sheet/unlock:
    parameters:
      - in: path
        name: id
        required: true
        schema:
          type: integer
          format: int64
          minimum: 1
        description: Identifier of the match.
    post:
      operationId: unlockMatchSheet
      tags:
        - Match sheets
      summary: Unlock the match sheet (admin override)
      description: |
        Re-opens a locked sheet for editing. Note: even if the sheet is unlocked,
        edits are still blocked when the parent match status is terminal
        (FINISHED / ABANDONED / POSTPONED) — the admin must first PATCH the match
        status. Requires `admin`.
      x-required-roles:
        - admin
      responses:
        '200':
          description: Sheet unlocked.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/matchSheet'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /events:
    get:
      operationId: listEvents
      tags:
        - Events
      summary: List sellable events
      description: |
        Public catalog of events for which tickets can be purchased.
      security: []
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
        - $ref: '#/components/parameters/Sort'
      responses:
        '200':
          description: Paginated list of events.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/pageEnvelope'
                  - type: object
                    properties:
                      content:
                        type: array
                        items:
                          $ref: '#/components/schemas/event'
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      operationId: createEvent
      tags:
        - Events
      summary: Create a sellable event
      x-required-roles:
        - admin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/eventCreateRequest'
      responses:
        '201':
          description: Event created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/event'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /events/{id}:
    parameters:
      - in: path
        name: id
        required: true
        schema:
          type: integer
          format: int64
          minimum: 1
    get:
      operationId: getEvent
      tags:
        - Events
      summary: Get an event by id
      security: []
      responses:
        '200':
          description: Event.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/event'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /tickets:
    get:
      operationId: listTicketsByEvent
      tags:
        - Tickets
      summary: List tickets for an event
      description: |
        Staff/admin view. Use `?eventId=` to filter by the parent event; results
        are paginated. To list the **caller's** own tickets, use `/tickets/mine`.
      x-required-roles:
        - staff
        - admin
      parameters:
        - in: query
          name: eventId
          required: true
          schema:
            type: integer
            format: int64
            minimum: 1
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
        - $ref: '#/components/parameters/Sort'
      responses:
        '200':
          description: Paginated list of tickets.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/pageEnvelope'
                  - type: object
                    properties:
                      content:
                        type: array
                        items:
                          $ref: '#/components/schemas/ticket'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      operationId: createTicket
      tags:
        - Tickets
      summary: Create a digital ticket
      description: |
        Creates a ticket in `PENDING` status owned by the authenticated user.
        The `code` field returned in the response is the UUID that the client
        renders as a QR code.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ticketCreateRequest'
      responses:
        '201':
          description: Ticket created in PENDING status.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ticket'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /tickets/mine:
    get:
      operationId: listMyTickets
      tags:
        - Tickets
      summary: List tickets owned by the caller
      description: |
        Returns the tickets whose `ownerSub` matches the JWT subject UUID of
        the caller. Used by the Android and SPA "My tickets" screens.
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
        - $ref: '#/components/parameters/Sort'
      responses:
        '200':
          description: Paginated list of tickets.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/pageEnvelope'
                  - type: object
                    properties:
                      content:
                        type: array
                        items:
                          $ref: '#/components/schemas/ticket'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /tickets/{id}:
    parameters:
      - in: path
        name: id
        required: true
        schema:
          type: integer
          format: int64
          minimum: 1
    get:
      operationId: getTicket
      tags:
        - Tickets
      summary: Get a ticket by id
      description: |
        Visible to the ticket owner or to staff/admin. Other authenticated
        callers receive 403.
      responses:
        '200':
          description: Ticket.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ticket'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /tickets/{id}/pay:
    parameters:
      - in: path
        name: id
        required: true
        schema:
          type: integer
          format: int64
          minimum: 1
    post:
      operationId: payTicket
      tags:
        - Tickets
      summary: Confirm payment of a ticket (PENDING → PAID)
      description: |
        Transitions the ticket to `PAID`, stamps `paymentDate`, persists the
        chosen `paymentMethod` (and `mbwayReference` when applicable), and
        publishes `ticket.ticket.paid` so the statistics-service can record
        the sale.

        Authorisation: the ticket owner, or staff/admin (over-the-counter
        cash payment).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ticketPayRequest'
      responses:
        '200':
          description: Ticket transitioned to PAID.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ticket'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Ticket is not in PENDING status.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/problem'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /tickets/validate:
    post:
      operationId: validateTicket
      tags:
        - Tickets
      summary: Validate a ticket at the gate (PAID → VALIDATED)
      description: |
        Looks up the ticket by its QR `code` (a UUID), transitions it to
        `VALIDATED`, stamps `validationDate` and `validatorSub` (the JWT
        subject of the staff member), and publishes
        `ticket.ticket.validated`.
      x-required-roles:
        - staff
        - admin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ticketValidateRequest'
      responses:
        '200':
          description: Ticket validated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ticket'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Ticket is not in PAID status.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/problem'
        '500':
          $ref: '#/components/responses/InternalServerError'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        Bearer JWT issued by Keycloak. Token must contain a `realm_access.roles`
        claim with one of: `admin`, `staff`, `fan`.

        Endpoint authorization rules are described per-operation. The `x-required-roles`
        extension lists the roles allowed for that endpoint; absence of the extension
        means any authenticated user can call it.
    oauth2:
      type: oauth2
      description: |
        OpenID Connect via Keycloak realm `tessera`. Web SPA uses the
        `tessera-web` client; Android uses `tessera-android`. Both are public
        clients with PKCE.
      flows:
        authorizationCode:
          authorizationUrl: http://localhost:8180/realms/tessera/protocol/openid-connect/auth
          tokenUrl: http://localhost:8180/realms/tessera/protocol/openid-connect/token
          refreshUrl: http://localhost:8180/realms/tessera/protocol/openid-connect/token
          scopes:
            openid: OpenID Connect identity
            profile: User profile claims
            email: Email claim
            roles: Realm roles claim
  parameters:
    Page:
      name: page
      in: query
      description: Zero-based page index.
      required: false
      schema:
        type: integer
        minimum: 0
        default: 0
      example: 0
    Size:
      name: size
      in: query
      description: Number of items per page.
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
      example: 20
    Sort:
      name: sort
      in: query
      description: |
        Sort directive in the form `field,asc` or `field,desc`. May be repeated
        for multi-field sorting. Allowed fields are documented per endpoint.
      required: false
      schema:
        type: array
        items:
          type: string
      example:
        - kickoffAt,desc
  responses:
    BadRequest:
      description: Request was malformed or failed validation.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/problem'
          example:
            type: https://tessera/api/errors/validation
            title: Validation failed
            status: 400
            detail: One or more fields are invalid.
            errors:
              - field: kickoffAt
                message: must be in the future
    Unauthorized:
      description: Missing or invalid bearer token.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/problem'
          example:
            type: https://tessera/api/errors/unauthorized
            title: Unauthorized
            status: 401
            detail: Bearer token is missing or expired.
    Forbidden:
      description: Authenticated, but the user lacks the required role.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/problem'
          example:
            type: https://tessera/api/errors/forbidden
            title: Forbidden
            status: 403
            detail: Role 'admin' is required for this operation.
    NotFound:
      description: The requested resource does not exist (or is soft-deleted).
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/problem'
          example:
            type: https://tessera/api/errors/not-found
            title: Not found
            status: 404
            detail: Match 42 does not exist.
    Conflict:
      description: Request conflicts with the current state of the resource.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/problem'
          example:
            type: https://tessera/api/errors/conflict
            title: Conflict
            status: 409
            detail: Match sheet is locked and cannot be modified.
    InternalServerError:
      description: Unexpected error on the server side.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/problem'
          example:
            type: https://tessera/api/errors/internal
            title: Internal Server Error
            status: 500
            detail: An unexpected error occurred. Please retry.
  schemas:
    Problem:
      $ref: '#/components/schemas/problem'
    PageEnvelope:
      $ref: '#/components/schemas/pageEnvelope'
    Me:
      $ref: '#/components/schemas/me'
    ClubMembership:
      $ref: '#/components/schemas/clubMembership'
    UserSummary:
      $ref: '#/components/schemas/userSummary'
    CreateUserRequest:
      $ref: '#/components/schemas/createUserRequest'
    UpdateUserRequest:
      $ref: '#/components/schemas/updateUserRequest'
    ClubMember:
      $ref: '#/components/schemas/clubMember'
    ClubMembers:
      $ref: '#/components/schemas/clubMembers'
    AddMemberRequest:
      $ref: '#/components/schemas/addMemberRequest'
    Club:
      $ref: '#/components/schemas/club'
    ClubCreateRequest:
      $ref: '#/components/schemas/clubCreateRequest'
    ClubUpdateRequest:
      $ref: '#/components/schemas/clubUpdateRequest'
    Venue:
      $ref: '#/components/schemas/venue'
    VenueCreateRequest:
      $ref: '#/components/schemas/venueCreateRequest'
    VenueUpdateRequest:
      $ref: '#/components/schemas/venueUpdateRequest'
    TeamCategory:
      $ref: '#/components/schemas/teamCategory'
    Team:
      $ref: '#/components/schemas/team'
    TeamCreateRequest:
      $ref: '#/components/schemas/teamCreateRequest'
    TeamUpdateRequest:
      $ref: '#/components/schemas/teamUpdateRequest'
    PlayerPosition:
      $ref: '#/components/schemas/playerPosition'
    DominantFoot:
      $ref: '#/components/schemas/dominantFoot'
    PlayerStatus:
      $ref: '#/components/schemas/playerStatus'
    Player:
      $ref: '#/components/schemas/player'
    PlayerCreateRequest:
      $ref: '#/components/schemas/playerCreateRequest'
    PlayerUpdateRequest:
      $ref: '#/components/schemas/playerUpdateRequest'
    MatchStatus:
      $ref: '#/components/schemas/matchStatus'
    Match:
      $ref: '#/components/schemas/match'
    MatchCreateRequest:
      $ref: '#/components/schemas/matchCreateRequest'
    MatchUpdateRequest:
      $ref: '#/components/schemas/matchUpdateRequest'
    MatchSheet:
      $ref: '#/components/schemas/matchSheet'
    LineupRole:
      $ref: '#/components/schemas/lineupRole'
    LineupEntry:
      $ref: '#/components/schemas/lineupEntry'
    LineupCreateRequest:
      $ref: '#/components/schemas/lineupCreateRequest'
    LineupUpdateRequest:
      $ref: '#/components/schemas/lineupUpdateRequest'
    OccurrenceType:
      $ref: '#/components/schemas/occurrenceType'
    Occurrence:
      $ref: '#/components/schemas/occurrence'
    OccurrenceCreateRequest:
      $ref: '#/components/schemas/occurrenceCreateRequest'
    MatchSummary:
      $ref: '#/components/schemas/matchSummary'
    MatchSheetHistory:
      $ref: '#/components/schemas/matchSheetHistory'
    SalesSummary:
      $ref: '#/components/schemas/salesSummary'
    SalesByMatch:
      $ref: '#/components/schemas/salesByMatch'
    SalesByClub:
      $ref: '#/components/schemas/salesByClub'
    Event:
      $ref: '#/components/schemas/event'
    EventCreateRequest:
      $ref: '#/components/schemas/eventCreateRequest'
    TicketStatus:
      $ref: '#/components/schemas/ticketStatus'
    Ticket:
      $ref: '#/components/schemas/ticket'
    TicketCreateRequest:
      $ref: '#/components/schemas/ticketCreateRequest'
    TicketPayRequest:
      $ref: '#/components/schemas/ticketPayRequest'
    TicketValidateRequest:
      $ref: '#/components/schemas/ticketValidateRequest'
    clubMembership:
      type: object
      description: |
        Membership of a user in a specific club, derived from Keycloak group
        paths. `clubId` references the `id` of an active club. `role` is
        `MANAGER` (full CRUD on the club's data) or `STAFF` (operational tasks
        only — ticket validation, match sheet entry).
      required:
        - clubId
        - role
      properties:
        clubId:
          type: integer
          format: int64
          examples:
            - 1
        role:
          type: string
          enum:
            - MANAGER
            - STAFF
          examples:
            - MANAGER
    me:
      type: object
      description: Profile information about the currently authenticated user, derived from the bearer token.
      required:
        - username
        - roles
        - clubMemberships
      properties:
        sub:
          type: string
          description: Stable Keycloak user id (`sub` claim).
          examples:
            - 5f8c8c5e-2b1f-4f3e-9d2a-7f5a0b1c2d3e
        username:
          type: string
          description: Keycloak `preferred_username` claim.
          examples:
            - gestor
        email:
          type: string
          format: email
          description: Keycloak `email` claim. Absent when the token lacks the email scope.
          examples:
            - gestor@tessera.pt
        firstName:
          type: string
          examples:
            - Gestor
        lastName:
          type: string
          examples:
            - Clube
        roles:
          type: array
          description: Realm roles relevant to Tessera. Filtered to known values.
          items:
            type: string
            enum:
              - platform-admin
              - club-manager
              - staff
              - fan
          examples:
            - - club-manager
        clubMemberships:
          type: array
          description: |
            Clubs this user is bound to, derived from the `groups` claim
            (`/clubs/<id>/managers` and `/clubs/<id>/staff` paths). Empty for
            platform admins, fans, and users without any club assignment.
          items:
            $ref: '#/components/schemas/clubMembership'
          examples:
            - - clubId: 1
                role: MANAGER
    problem:
      type: object
      description: |
        RFC 7807 Problem Details for HTTP APIs. Returned with media type
        `application/problem+json` for all error responses.
      required:
        - type
        - title
        - status
      properties:
        type:
          type: string
          format: uri
          description: A URI reference identifying the problem type.
          examples:
            - https://tessera/api/errors/validation
        title:
          type: string
          description: Short, human-readable summary of the problem type.
          examples:
            - Validation failed
        status:
          type: integer
          format: int32
          description: HTTP status code generated by the origin server.
          examples:
            - 400
        detail:
          type: string
          description: Human-readable explanation specific to this occurrence.
          examples:
            - Field 'kickoffAt' must be in the future.
        instance:
          type: string
          format: uri
          description: URI reference identifying the specific occurrence.
          examples:
            - /api/v1/matches/42
        errors:
          type: array
          description: Field-level errors when `type` is a validation problem.
          items:
            type: object
            required:
              - field
              - message
            properties:
              field:
                type: string
                description: Dotted path to the offending field.
                examples:
                  - kickoffAt
              message:
                type: string
                examples:
                  - must be in the future
    userSummary:
      type: object
      description: |
        Summary of a Keycloak user as exposed by the admin endpoints. The `id`
        is the Keycloak UUID — used as the path parameter in user-scoped routes
        and as the `userId` when adding/removing club memberships.
      required:
        - id
      properties:
        id:
          type: string
          format: uuid
          description: Keycloak user id.
          examples:
            - c03c87a1-eb23-4e5b-be4e-ed172797d08c
        username:
          type: string
          examples:
            - gestor
        email:
          type: string
          format: email
          examples:
            - gestor@tessera.pt
        firstName:
          type: string
          examples:
            - Gestor
        lastName:
          type: string
          examples:
            - Clube
        enabled:
          type: boolean
          description: Whether the user can log in. Disabled users keep their data but cannot authenticate.
          examples:
            - true
        roles:
          type: array
          description: |
            Effective realm roles assigned to the user (direct assignments plus
            those inherited through composites, e.g. `fan` granted via the
            `default-roles-tessera` default role). Filtered to the app roles.
          items:
            type: string
            enum:
              - platform-admin
              - club-manager
              - staff
              - fan
          examples:
            - - club-manager
    createUserRequest:
      type: object
      description: |
        Payload for creating a new Keycloak user. The realm role is set at the
        same time as the user — the API restricts it to `club-manager` or
        `staff` (platform-admins are bootstrapped via realm-export and fans
        inherit the realm's default role).
      required:
        - username
        - firstName
        - lastName
        - password
        - role
      properties:
        username:
          type: string
          minLength: 3
          maxLength: 60
          examples:
            - gestor2
        email:
          type: string
          format: email
          examples:
            - gestor2@tessera.pt
        firstName:
          type: string
          minLength: 1
          maxLength: 100
          examples:
            - Gestor
        lastName:
          type: string
          minLength: 1
          maxLength: 100
          examples:
            - Dois
        password:
          type: string
          minLength: 6
          maxLength: 200
          description: |
            Initial password. Set as **temporary** in Keycloak — the user is
            forced to choose a new password on their first login.
          examples:
            - gestor12345
        role:
          type: string
          enum:
            - club-manager
            - staff
          description: Realm role to assign. Restricted to operational roles.
          examples:
            - club-manager
    updateUserRequest:
      type: object
      description: |
        Payload for updating a Keycloak user. All fields are optional — only the
        ones present are applied. `role` reassigns the manageable role
        (`club-manager`/`staff`); `forcePasswordReset` makes the user choose a new
        password on next login. Passwords are not set here (create a user with a
        temporary password, or force a reset).
      properties:
        email:
          type: string
          format: email
          examples:
            - gestor2@tessera.pt
        firstName:
          type: string
          minLength: 1
          maxLength: 100
          examples:
            - Gestor
        lastName:
          type: string
          minLength: 1
          maxLength: 100
          examples:
            - Dois
        enabled:
          type: boolean
          description: Enable or disable the account. Disabled users cannot authenticate.
          examples:
            - false
        role:
          type: string
          enum:
            - club-manager
            - staff
          description: Reassign the manageable realm role. Leaves platform-admin/fan untouched.
          examples:
            - staff
        forcePasswordReset:
          type: boolean
          description: When true, adds the UPDATE_PASSWORD required action (change on next login).
          examples:
            - true
    pageEnvelope:
      type: object
      description: |
        Standard pagination envelope for list endpoints. The `content` array
        carries the page items; concrete endpoints document its element type.
      required:
        - content
        - page
        - size
        - totalElements
        - totalPages
      properties:
        content:
          type: array
          description: Items on this page.
          items: {}
        page:
          type: integer
          minimum: 0
          description: Zero-based page index.
          examples:
            - 0
        size:
          type: integer
          minimum: 1
          description: Page size requested.
          examples:
            - 20
        totalElements:
          type: integer
          minimum: 0
          description: Total number of items across all pages.
          examples:
            - 137
        totalPages:
          type: integer
          minimum: 0
          description: Total number of pages.
          examples:
            - 7
    club:
      type: object
      description: |
        A football club. Owns one or more teams (senior, youth, female, etc.).
        Identified by a stable numeric `id`; clubs are soft-deleted to preserve
        historical match records.
      required:
        - id
        - name
        - createdAt
      properties:
        id:
          type: integer
          format: int64
          readOnly: true
          description: Stable numeric identifier assigned by the server.
          examples:
            - 1
        name:
          type: string
          minLength: 2
          maxLength: 200
          description: Official name of the club.
          examples:
            - SU 1.º Dezembro
        foundedYear:
          type:
            - integer
            - 'null'
          format: int32
          minimum: 1850
          maximum: 2100
          description: Year the club was founded.
          examples:
            - 1953
        crestUrl:
          type:
            - string
            - 'null'
          format: uri
          description: URL to the club crest / logo image.
          examples:
            - https://tessera.example/clubs/1/crest.png
        createdAt:
          type: string
          format: date-time
          readOnly: true
          description: Server-assigned creation timestamp.
          examples:
            - '2026-04-28T10:00:00Z'
    clubCreateRequest:
      type: object
      description: Payload to create a new club. `id` and `createdAt` are server-assigned.
      required:
        - name
      properties:
        name:
          type: string
          minLength: 2
          maxLength: 200
          examples:
            - SU 1.º Dezembro
        foundedYear:
          type:
            - integer
            - 'null'
          format: int32
          minimum: 1850
          maximum: 2100
          examples:
            - 1953
        crestUrl:
          type:
            - string
            - 'null'
          format: uri
