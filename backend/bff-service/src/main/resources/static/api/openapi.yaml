        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /stats/match-sheets:
    get:
      operationId: listMatchSheetHistory
      tags:
        - Statistics
      summary: List historical match-sheet snapshots
      description: |
        Returns matches whose match-sheet has been closed and snapshotted by the
        statistics-service. Filters can be combined; results are ordered by
        `kickoffAt` ascending (configurable via the `sort` parameter).

        Public endpoint — fans can browse the historical archive.
      security: []
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
        - $ref: '#/components/parameters/Sort'
        - in: query
          name: clubId
          required: false
          schema:
            type: integer
            format: int64
          description: Only matches where the given club was home or away.
        - in: query
          name: playerId
          required: false
          schema:
            type: integer
            format: int64
          description: Only matches where the player appeared in the lineup.
        - in: query
          name: season
          required: false
          schema:
            type: string
            pattern: ^[0-9]{4}-[0-9]{2}$
          description: Season label, e.g. `2026-27`.
        - in: query
          name: status
          required: false
          schema:
            type: string
            enum:
              - SCHEDULED
              - LIVE
              - FINISHED
              - POSTPONED
              - ABANDONED
              - CANCELLED
          description: Match status at the time the sheet was closed.
      responses:
        '200':
          description: Page of match summaries.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/pageEnvelope'
                  - type: object
                    properties:
                      content:
                        type: array
                        items:
                          $ref: '#/components/schemas/matchSummary'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /stats/match-sheets/{matchId}:
    parameters:
      - in: path
        name: matchId
        required: true
        schema:
          type: integer
          format: int64
          minimum: 1
    get:
      operationId: getMatchSheetHistory
      tags:
        - Statistics
      summary: Get a historical match-sheet snapshot
      description: |
        Returns the full snapshot for the given match: summary, lineup, and
        occurrences as recorded by the statistics-service when the match-sheet
        was closed. Public endpoint.
      security: []
      responses:
        '200':
          description: The snapshot.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/matchSheetHistory'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
