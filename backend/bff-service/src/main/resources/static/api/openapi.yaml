        status:
          $ref: '#/components/schemas/playerStatus'
    playerUpdateRequest:
      type: object
      description: |
        Partial update payload (PATCH). Omitted fields are left unchanged.
        At least one field must be provided.
      minProperties: 1
      properties:
        firstName:
          type: string
          minLength: 1
          maxLength: 100
        lastName:
          type: string
          minLength: 1
          maxLength: 100
        birthdate:
          type:
            - string
            - 'null'
          format: date
        nationality:
          type:
            - string
            - 'null'
          pattern: ^[A-Z]{3}$
        position:
          $ref: '#/components/schemas/playerPosition'
        shirtNumber:
          type:
            - integer
            - 'null'
          format: int32
          minimum: 1
          maximum: 99
        photoUrl:
          type:
            - string
            - 'null'
          format: uri
        dominantFoot:
          oneOf:
            - $ref: '#/components/schemas/dominantFoot'
            - type: 'null'
        height:
          type:
            - integer
            - 'null'
          format: int32
          minimum: 100
          maximum: 250
        weight:
          type:
            - integer
            - 'null'
          format: int32
          minimum: 30
          maximum: 200
        status:
          $ref: '#/components/schemas/playerStatus'
    matchStatus:
      type: string
      description: |
        Lifecycle of a match. Allowed transitions (server-enforced):
          - SCHEDULED → LIVE | POSTPONED | ABANDONED | CANCELLED
          - LIVE → FINISHED | ABANDONED
          - POSTPONED → SCHEDULED  (rescheduled)
          - FINISHED, ABANDONED, CANCELLED — terminal

        Distinction between terminal states:
          - FINISHED: completed normally, scores recorded.
          - ABANDONED: started but had to be stopped (weather, safety).
          - CANCELLED: called off before kickoff, no intent to reschedule.
      enum:
        - SCHEDULED
        - LIVE
        - FINISHED
        - POSTPONED
        - ABANDONED
        - CANCELLED
      examples:
        - SCHEDULED
    match:
      type: object
      description: |
        A scheduled, live or finished football match between two teams. Soft-deleted
        to preserve historical records (match sheets, ticket sales).
      required:
        - id
        - homeTeamId
        - awayTeamId
        - kickoffAt
        - status
        - createdAt
      properties:
        id:
          type: integer
          format: int64
          readOnly: true
          examples:
            - 1
        homeTeamId:
          type: integer
          format: int64
          examples:
            - 1
        awayTeamId:
          type: integer
          format: int64
          examples:
            - 2
        venueId:
          type:
            - integer
            - 'null'
          format: int64
          description: |
            Identifier of the venue. May be null while the match is being scheduled
            and the venue is yet to be confirmed.
          examples:
            - 1
        kickoffAt:
          type: string
          format: date-time
          description: Scheduled (or actual) kickoff date-time, ISO 8601 with offset.
          examples:
            - '2026-09-15T20:30:00Z'
        status:
          $ref: '#/components/schemas/matchStatus'
        homeScore:
          type:
            - integer
            - 'null'
          format: int32
          minimum: 0
          description: Home team's goals. Required once status reaches FINISHED.
          examples:
            - 2
        awayScore:
          type:
            - integer
            - 'null'
          format: int32
          minimum: 0
          description: Away team's goals. Required once status reaches FINISHED.
          examples:
            - 1
        refereeName:
          type:
            - string
            - 'null'
          maxLength: 200
          description: Free-text referee name (no separate referee resource for v1).
          examples:
            - Maria Santos
        createdAt:
          type: string
          format: date-time
          readOnly: true
    matchCreateRequest:
      type: object
      description: |
        Payload to create a match. The match always starts in SCHEDULED status.
        Constraints validated by the server:
          - `homeTeamId` ≠ `awayTeamId`
          - both teams must exist and be active
          - `venueId`, if provided, must exist and be active
      required:
        - homeTeamId
        - awayTeamId
        - kickoffAt
      properties:
        homeTeamId:
          type: integer
          format: int64
        awayTeamId:
          type: integer
          format: int64
        venueId:
          type:
            - integer
            - 'null'
          format: int64
        kickoffAt:
          type: string
          format: date-time
        refereeName:
          type:
            - string
            - 'null'
          maxLength: 200
    matchUpdateRequest:
      type: object
      description: |
        Partial update payload (PATCH). Omitted fields are left unchanged.
        At least one field must be provided. Status transitions are validated
        server-side; invalid transitions are rejected with 409.
      minProperties: 1
      properties:
        venueId:
          type:
            - integer
            - 'null'
          format: int64
        kickoffAt:
          type: string
          format: date-time
        status:
          $ref: '#/components/schemas/matchStatus'
        homeScore:
          type:
            - integer
            - 'null'
          format: int32
          minimum: 0
        awayScore:
          type:
            - integer
            - 'null'
          format: int32
          minimum: 0
        refereeName:
          type:
            - string
            - 'null'
          maxLength: 200
    lineupRole:
      type: string
      description: |
        Role of a player in the match-day lineup:
          - STARTER: starts the match on the pitch
          - SUBSTITUTE: on the bench, eligible to come on
      enum:
        - STARTER
        - SUBSTITUTE
      examples:
        - STARTER
    lineupEntry:
      type: object
      description: A single player listed on the match-day lineup of one team.
      required:
        - playerId
        - teamId
        - role
      properties:
        playerId:
          type: integer
          format: int64
          examples:
            - 1
        teamId:
          type: integer
          format: int64
          description: Must equal the match's homeTeamId or awayTeamId.
          examples:
            - 1
        shirtNumber:
          type:
            - integer
            - 'null'
          format: int32
          minimum: 1
          maximum: 99
          description: |
            Shirt worn for this match. Defaults to the player's current shirtNumber
            but can be overridden per match (e.g. number changes, special editions).
        role:
          $ref: '#/components/schemas/lineupRole'
    occurrenceType:
      type: string
      description: |
        Type of in-game occurrence:
          - GOAL: scored a goal for own team
          - OWN_GOAL: scored an own goal (counts for the opposing team)
          - YELLOW_CARD: yellow card shown
          - RED_CARD: red card shown (direct, or second yellow)
          - SUBSTITUTION: tactical substitution; replacedPlayerId is required
          - FOUL: foul committed (single tactical event; does not imply a card)
      enum:
        - GOAL
        - OWN_GOAL
        - YELLOW_CARD
        - RED_CARD
        - SUBSTITUTION
        - FOUL
      examples:
        - GOAL
    occurrence:
      type: object
      description: |
        A single in-game event recorded in the match sheet (goal, card, substitution).
        Append-only while the match is live; can be deleted only while the sheet is
        unlocked and the match status allows edits.
      required:
        - id
        - minute
        - type
        - teamId
        - playerId
        - createdAt
      properties:
        id:
          type: integer
          format: int64
          readOnly: true
        minute:
          type: integer
          format: int32
          minimum: 0
          maximum: 200
          description: |
            Match minute (0–200 to cover regulation time, stoppage and extra time).
          examples:
            - 34
        type:
          $ref: '#/components/schemas/occurrenceType'
        teamId:
          type: integer
          format: int64
          description: Team to which the player belongs.
        playerId:
          type: integer
          format: int64
          description: Player who scored / received the card / went off (for substitution).
        replacedPlayerId:
          type:
            - integer
            - 'null'
          format: int64
          description: |
            Required for SUBSTITUTION — id of the player coming on. Must be null
            for any other occurrence type.
        createdAt:
          type: string
          format: date-time
          readOnly: true
    matchSheet:
      type: object
      description: |
        The technical match record (lineups + occurrences). Created lazily on the
        first GET. Edits require:
          - `locked = false`, AND
          - parent match's status ∈ {SCHEDULED, LIVE}.
        When the match transitions to FINISHED/ABANDONED/POSTPONED, the sheet is
        locked automatically. An admin can unlock it via `POST /unlock`.
      required:
        - matchId
        - locked
        - lineup
        - occurrences
      properties:
        matchId:
          type: integer
          format: int64
        locked:
          type: boolean
        lockedAt:
          type:
            - string
            - 'null'
          format: date-time
        lineup:
          type: array
          description: All lineup entries (both teams), ordered by team then shirt number.
          items:
            $ref: '#/components/schemas/lineupEntry'
        occurrences:
          type: array
          description: Match events ordered by minute ascending, then by id.
          items:
            $ref: '#/components/schemas/occurrence'
    lineupCreateRequest:
      type: object
      description: Add a player to the match-sheet lineup.
      required:
        - playerId
        - role
      properties:
        playerId:
          type: integer
          format: int64
        shirtNumber:
          type:
            - integer
            - 'null'
          format: int32
          minimum: 1
          maximum: 99
          description: Optional override; defaults to the player's current shirt.
        role:
          $ref: '#/components/schemas/lineupRole'
    lineupUpdateRequest:
      type: object
      description: Partial update of an existing lineup entry. At least one field required.
      minProperties: 1
      properties:
        shirtNumber:
          type:
            - integer
            - 'null'
          format: int32
          minimum: 1
          maximum: 99
        role:
          $ref: '#/components/schemas/lineupRole'
    matchSummary:
      type: object
      description: |
        Snapshot of a match captured by the statistics-service when the match-sheet
        was closed. Read-only view, fed by the `match.sheet.closed` event.
      required:
        - matchId
        - season
        - matchStatus
        - kickoffAt
        - homeTeamId
        - awayTeamId
        - homeClubId
        - awayClubId
      properties:
        matchId:
          type: integer
          format: int64
        season:
          type: string
          description: Season label in `YYYY-YY` format.
          pattern: ^[0-9]{4}-[0-9]{2}$
          examples:
            - 2026-27
        matchStatus:
          type: string
          description: Match status at the time the sheet was closed.
          enum:
            - SCHEDULED
            - LIVE
            - FINISHED
            - POSTPONED
            - ABANDONED
            - CANCELLED
        kickoffAt:
          type: string
          format: date-time
        homeTeamId:
          type: integer
          format: int64
        awayTeamId:
          type: integer
          format: int64
        homeClubId:
          type: integer
          format: int64
        awayClubId:
          type: integer
          format: int64
        venueId:
          type:
            - integer
            - 'null'
          format: int64
        homeScore:
          type:
            - integer
            - 'null'
          format: int32
        awayScore:
          type:
            - integer
            - 'null'
          format: int32
        refereeName:
          type:
            - string
            - 'null'
    matchSheetHistory:
      type: object
      description: |
        Full snapshot of a match: summary + lineup + occurrences as recorded at
        the moment the sheet was closed. Returned by
        `GET /stats/match-sheets/{matchId}`.
      required:
        - matchId
        - summary
        - lineup
        - occurrences
      properties:
        matchId:
          type: integer
          format: int64
        summary:
          $ref: '#/components/schemas/matchSummary'
        lineup:
          type: array
          items:
            $ref: '#/components/schemas/lineupEntry'
        occurrences:
          type: array
          items:
            $ref: '#/components/schemas/occurrence'
    salesSummary:
      type: object
      description: Aggregated ticket sales for a period or for the whole system.
      required:
        - sold
        - validated
        - revenue
        - validationRate
      properties:
        sold:
          type: integer
          format: int64
          description: Number of tickets paid (PENDING → PAID).
          examples:
            - 1234
        validated:
          type: integer
          format: int64
          description: Number of those tickets that were validated at the gate.
          examples:
            - 1100
        revenue:
          type: string
          description: Total revenue, as decimal string to preserve precision.
          examples:
            - '12345.50'
        validationRate:
          type: string
          description: |
            `validated / sold` (0.000 .. 1.000). Always 0 in the date-range
            summary because validation happens later than payment and would
            skew the metric.
          examples:
            - '0.892'
    salesByMatch:
      type: object
      description: Ticket sales aggregated for a single match.
      required:
        - matchId
        - sold
        - validated
        - revenue
      properties:
        matchId:
          type: integer
          format: int64
        sold:
          type: integer
          format: int64
        validated:
          type: integer
          format: int64
        revenue:
          type: string
          description: Total revenue for this match, decimal string.
    salesByClub:
      type: object
      description: Ticket sales aggregated for a single club (matches it hosts at home).
      required:
        - clubId
        - sold
        - validated
        - revenue
        - validationRate
      properties:
        clubId:
          type: integer
          format: int64
        sold:
          type: integer
          format: int64
          description: Number of tickets paid for the club's home matches.
        validated:
          type: integer
          format: int64
          description: Number of those tickets that were validated at the gate.
        revenue:
          type:
            - string
            - 'null'
          description: |
            Total revenue for the club's home matches, decimal string. Null when the
            caller is staff (staff may see counts but not revenue).
        validationRate:
          type: string
          description: '`validated / sold` (0.000 .. 1.000).'
          examples:
            - '0.875'
    occurrenceCreateRequest:
      type: object
      description: Append a new occurrence to the match sheet.
      required:
        - minute
        - type
        - playerId
      properties:
        minute:
          type: integer
          format: int32
          minimum: 0
          maximum: 200
        type:
          $ref: '#/components/schemas/occurrenceType'
        playerId:
          type: integer
          format: int64
        replacedPlayerId:
          type:
            - integer
            - 'null'
          format: int64
          description: |
            Required for SUBSTITUTION (player coming on). Must be null otherwise.
    event:
      type: object
      description: |
        A sellable event — typically attached to a match — bundling the normal
        and supporter prices for that occasion.
      required:
        - id
        - priceNormal
        - priceSupporter
        - status
        - createdAt
      properties:
        id:
          type: integer
          format: int64
        name:
          type:
            - string
            - 'null'
        matchLabel:
          type:
            - string
            - 'null'
          description: |
            Snapshot of the fixture ("Home vs Away") taken when the box office was
            opened. Lets tickets keep showing the teams even if the match is later
            deleted in match-service.
        matchId:
          type:
            - integer
            - 'null'
          format: int64
          description: Optional link to a match in match-service.
        priceNormal:
          type: string
          description: Decimal string.
        priceSupporter:
          type: string
          description: Decimal string.
        status:
          type: string
          enum:
            - DRAFT
            - PUBLISHED
            - SALES_CLOSED
            - CANCELLED
        createdAt:
          type: string
          format: date-time
    eventCreateRequest:
      type: object
      required:
        - name
        - priceNormal
        - priceSupporter
      properties:
        name:
          type: string
          minLength: 1
        matchLabel:
          type:
            - string
            - 'null'
          description: |
            Snapshot of the fixture ("Home vs Away") at box-office creation, so
            tickets survive a later match deletion.
        matchId:
          type:
            - integer
            - 'null'
          format: int64
        priceNormal:
          type: string
          description: Decimal string, e.g. "10.00".
        priceSupporter:
          type: string
          description: Decimal string.
        status:
          type: string
          enum:
            - DRAFT
            - PUBLISHED
            - SALES_CLOSED
            - CANCELLED
          default: PUBLISHED
          description: |
            Optional. Defaults to `PUBLISHED` so tickets are immediately
            purchasable.
    ticketStatus:
      type: string
      description: |
        Lifecycle of a digital ticket.

        * `PENDING`    — created but not yet paid
        * `PAID`       — payment confirmed (`POST /tickets/{id}/pay`)
        * `VALIDATED`  — scanned at the gate (`POST /tickets/validate`)
      enum:
        - PENDING
        - PAID
        - VALIDATED
    ticket:
      type: object
      description: |
        A digital ticket. `code` is the UUID the fan renders as a QR code in
        the SPA / Android app; staff scan it at the gate to validate the ticket.
      required:
        - id
        - code
        - eventId
        - price
        - status
        - createdAt
      properties:
        id:
          type: integer
          format: int64
          examples:
            - 12345
        code:
          type: string
          format: uuid
          description: Unique UUID payload of the QR code. Generated server-side.
        eventId:
          type: integer
          format: int64
        matchId:
          type:
            - integer
            - 'null'
          format: int64
          description: |
            Match the parent event is attached to, if any. Mirrored here so the
            Android validator can show context without an extra call.
        ownerSub:
          type:
            - string
            - 'null'
          description: Keycloak subject UUID of the buyer.
        price:
          type: string
          description: Decimal string, e.g. "10.00".
        status:
          $ref: '#/components/schemas/ticketStatus'
        paymentMethod:
          type:
            - string
            - 'null'
          enum:
            - MBWAY
            - CARD
            - null
        checkoutUrl:
          type:
            - string
            - 'null'
          description: |
            Stripe Checkout hosted-page URL. Only present in the response of
            POST /tickets/{id}/pay for a fresh CARD payment — never on reads.
        createdAt:
          type: string
          format: date-time
        paymentDate:
          type:
            - string
            - 'null'
          format: date-time
        validationDate:
          type:
            - string
            - 'null'
          format: date-time
        validatorSub:
          type:
            - string
            - 'null'
          description: Keycloak subject UUID of the staff member who scanned the ticket.
    ticketCreateRequest:
      type: object
      required:
        - eventId
      properties:
        eventId:
          type: integer
          format: int64
          minimum: 1
        supporter:
          type: boolean
          default: false
          description: |
            If `true`, applies the event's supporter price (typically discounted
            for season-pass holders); otherwise the normal price is used.
    ticketPayRequest:
      type: object
      required:
        - paymentMethod
      properties:
        paymentMethod:
          type: string
          enum:
            - MBWAY
            - CARD
        mbwayReference:
          type:
            - string
            - 'null'
          description: |
            Optional. Reference returned by the MB WAY provider (only meaningful
            when `paymentMethod = MBWAY`).
    ticketValidateRequest:
      type: object
      required:
        - code
      properties:
        code:
          type: string
          format: uuid
          description: |
            The UUID payload extracted from the scanned QR code.
