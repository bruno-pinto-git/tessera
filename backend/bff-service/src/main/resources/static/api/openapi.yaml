openapi: 3.1.0
info:
  title: Tessera API
  version: 0.1.0
  description: |
    REST API for the Tessera platform — match management, ticketing,
    and statistics for lower-division football clubs.

    This document is the source of truth for the contract between the
    backend (BFF + microservices) and its consumers (web SPA, Android
    apps for fans and staff). Implementations are derived from this spec.
  contact:
    name: Tessera Team
  license:
    name: Academic project
    url: https://example.invalid/license
servers:
  - url: http://localhost:8000/api/v1
    description: Local development (via NGINX)
  - url: http://localhost:8080/api/v1
    description: Local development (BFF direct)
security:
  - bearerAuth: []
tags:
  - name: Profile
    description: Information about the authenticated user.
  - name: Clubs
    description: Football clubs.
  - name: Teams
    description: Teams within a club (senior, sub-19, female, ...).
  - name: Players
    description: Players belonging to a team.
  - name: Venues
    description: Stadiums and grounds where matches are played.
  - name: Matches
    description: Scheduled, live and finished matches.
  - name: Match sheets
    description: Lineups and in-game occurrences (goals, cards, subs).
  - name: Statistics
    description: Aggregated read-side data on matches, players, teams and sales.
  - name: Tickets
    description: |
      Digital tickets — creation, payment, listing, and gate validation.
      The QR code rendered by clients is simply the ticket's `code` UUID.
  - name: Events
    description: Sellable bundles of tickets attached to a match.
  - name: Users
    description: |
      Keycloak user administration (search, create, delete). Restricted
      to `platform-admin`. Used by the admin UI to bootstrap accounts
      before attaching them to clubs.
  - name: Members
    description: |
      Per-club membership operations (managers and staff). Memberships
      are stored as Keycloak group entries under
      `/clubs/<clubId>/{managers,staff}` and propagate to the JWT
      `groups` claim used by `@clubAuthz` scope checks.
paths:
  /me:
    get:
      operationId: getMe
      tags:
        - Profile
      summary: Get the authenticated user's profile
      description: |
        Returns the profile of the currently authenticated user, projected
        from the bearer token. Useful for the SPA and Android apps to
        discover the user's role and decide which screens to render.
      responses:
        '200':
          description: Profile of the authenticated user.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/me'
              example:
                sub: 5f8c8c5e-2b1f-4f3e-9d2a-7f5a0b1c2d3e
                username: gestor
                email: gestor@tessera.pt
                firstName: Gestor
                lastName: Clube
                roles:
                  - club-manager
                clubMemberships:
                  - clubId: 1
                    role: MANAGER
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /users:
    get:
      operationId: searchUsers
      tags:
        - Users
      summary: Search users in Keycloak
      description: |
        Returns Keycloak users matching the optional `search` term. The
        search is performed by Keycloak across username, email, first name
        and last name. Used by the admin UI to find existing users for
        attaching to clubs.
      x-required-roles:
        - platform-admin
      parameters:
        - in: query
          name: search
          required: false
          schema:
            type: string
          description: Substring matched against username/email/name.
          example: gestor
        - in: query
          name: first
          required: false
          schema:
            type: integer
            minimum: 0
            default: 0
          description: Offset for pagination.
        - in: query
          name: max
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
          description: Maximum results to return.
      responses:
        '200':
          description: Matching users (may be empty).
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/userSummary'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      operationId: createUser
      tags:
        - Users
      summary: Create a new Keycloak user
      description: |
        Creates a user in the Tessera realm, sets their initial password, and
        assigns the chosen realm role. Does **not** bind the user to any club
        — that's a separate step via `POST /clubs/{id}/members`.
      x-required-roles:
        - platform-admin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/createUserRequest'
            example:
              username: gestor2
              email: gestor2@tessera.pt
              firstName: Gestor
              lastName: Dois
              password: gestor12345
              role: club-manager
      responses:
        '201':
          description: User created.
          headers:
            Location:
              description: URI of the created user.
              schema:
                type: string
                format: uri
                example: /api/v1/users/c03c87a1-eb23-4e5b-be4e-ed172797d08c
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/userSummary'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /users/{id}:
    parameters:
      - in: path
        name: id
        required: true
        schema:
          type: string
          format: uuid
        description: Keycloak user id.
    get:
      operationId: getUserById
      tags:
        - Users
      summary: Get a user
      description: Returns the Keycloak user with the given id.
      x-required-roles:
        - platform-admin
      responses:
        '200':
          description: User.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/userSummary'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    put:
      operationId: updateUser
      tags:
        - Users
      summary: Update a user
      description: |
        Updates a user's profile and account state. Only the fields present in
        the body are changed. The role, when supplied, reassigns the
        *manageable* role (`club-manager`/`staff`) — the previous one is removed
        and the new one added; `platform-admin` and `fan` are left untouched.
        `forcePasswordReset` adds the `UPDATE_PASSWORD` required action so the
        user must choose a new password on their next login.
      x-required-roles:
        - platform-admin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/updateUserRequest'
      responses:
        '200':
          description: Updated user.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/userSummary'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    delete:
      operationId: deleteUser
      tags:
        - Users
      summary: Delete a user
      description: |
        Permanently removes the user from Keycloak. Any club memberships are
        revoked at the same time (the user falls out of the corresponding
        groups). This is **not** reversible — for a temporary lock, disable the
        user instead (`PUT /users/{id}` with `enabled: false`). Note: users who
        sign in via a social identity provider (Google) are re-provisioned on
        their next login, so deleting them is not a permanent ban — disable them.
      x-required-roles:
        - platform-admin
      responses:
        '204':
          description: User deleted.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /clubs:
    get:
      operationId: listClubs
      tags:
        - Clubs
      summary: List clubs
      description: |
        Returns a paginated list of clubs. Soft-deleted clubs are excluded.
        Public endpoint — no role required.
      security: []
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
        - $ref: '#/components/parameters/Sort'
        - in: query
          name: name
          required: false
          schema:
            type: string
          description: Case-insensitive substring match on club name.
          example: Dezembro
      responses:
        '200':
          description: Page of clubs.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/pageEnvelope'
                  - type: object
                    properties:
                      content:
                        type: array
                        items:
                          $ref: '#/components/schemas/club'
              example:
                content:
                  - id: 1
                    name: SU 1.º Dezembro
                    foundedYear: 1953
                    crestUrl: null
                    createdAt: '2026-04-28T10:00:00Z'
                page: 0
                size: 20
                totalElements: 1
                totalPages: 1
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      operationId: createClub
      tags:
        - Clubs
      summary: Create a new club
      description: Creates a new club. Requires the `admin` role.
      x-required-roles:
        - admin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/clubCreateRequest'
            example:
              name: SU 1.º Dezembro
              foundedYear: 1953
      responses:
        '201':
          description: Club created.
          headers:
            Location:
              description: URI of the created club.
              schema:
                type: string
                format: uri
                example: /api/v1/clubs/1
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/club'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /clubs/{id}:
    parameters:
      - in: path
        name: id
        required: true
        schema:
          type: integer
          format: int64
          minimum: 1
        description: Stable numeric identifier of the club.
        example: 1
    get:
      operationId: getClubById
      tags:
        - Clubs
      summary: Get a club by id
      description: Returns the club with the given id. Public endpoint.
      security: []
      responses:
        '200':
          description: The club.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/club'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    patch:
      operationId: updateClub
      tags:
        - Clubs
      summary: Partially update a club
      description: |
        Updates fields of an existing club. Omitted fields are left unchanged.
        Requires the `admin` role.
      x-required-roles:
        - admin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/clubUpdateRequest'
            example:
              foundedYear: 1953
              crestUrl: https://tessera.example/clubs/1/crest.png
      responses:
        '200':
          description: Club updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/club'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalServerError'
    delete:
      operationId: deleteClub
      tags:
        - Clubs
      summary: Soft-delete a club
      description: |
        Marks the club as deleted (sets `deletedAt`). Existing matches and
        historical references remain intact. Requires the `admin` role.
      x-required-roles:
        - admin
      responses:
        '204':
          description: Club deleted.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /clubs/{clubId}/members:
    parameters:
      - in: path
        name: clubId
        required: true
        schema:
          type: integer
          format: int64
          minimum: 1
        description: Tessera club id.
    get:
      operationId: listClubMembers
      tags:
        - Members
      summary: List a club's managers and staff
      description: |
        Returns the union of users in the Keycloak groups
        `/clubs/<clubId>/managers` and `/clubs/<clubId>/staff`, grouped by
        role. Empty arrays are returned if no members of a given role exist.
      x-required-roles:
        - platform-admin
      responses:
        '200':
          description: Members grouped by role.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/clubMembers'
              example:
                managers:
                  - userId: c03c87a1-eb23-4e5b-be4e-ed172797d08c
                    username: gestor
                    email: gestor@tessera.pt
                    firstName: Gestor
                    lastName: Clube
                    role: MANAGER
                staff: []
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      operationId: addClubMember
      tags:
        - Members
      summary: Attach an existing user to the club
      description: |
        Adds the given user to the Keycloak group corresponding to `role`.
        If they are already a member, the operation is a no-op (idempotent).
        The user must already exist in Keycloak — create one first via
        `POST /users` if needed.
      x-required-roles:
        - platform-admin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/addMemberRequest'
            example:
              userId: c03c87a1-eb23-4e5b-be4e-ed172797d08c
              role: MANAGER
      responses:
        '204':
          description: Membership granted.
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /clubs/{clubId}/members/{userId}:
    parameters:
      - in: path
        name: clubId
        required: true
        schema:
          type: integer
          format: int64
          minimum: 1
        description: Tessera club id.
      - in: path
        name: userId
        required: true
        schema:
          type: string
          format: uuid
        description: Keycloak user id of the member being removed.
    delete:
      operationId: removeClubMember
      tags:
        - Members
      summary: Revoke a club membership
      description: |
        Removes the user from the Keycloak group corresponding to `role`.
        The user itself is preserved — only the membership goes away. If the
        user wasn't actually in the group, the operation is a no-op.
      x-required-roles:
        - platform-admin
      parameters:
        - in: query
          name: role
          required: true
          schema:
            type: string
            enum:
              - MANAGER
              - STAFF
          description: Which role to revoke.
          example: MANAGER
      responses:
        '204':
          description: Membership revoked.
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /venues:
    get:
      operationId: listVenues
      tags:
        - Venues
      summary: List venues
      description: |
        Returns a paginated list of venues. Soft-deleted venues are excluded.
        Public endpoint.
      security: []
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
        - $ref: '#/components/parameters/Sort'
        - in: query
          name: name
          required: false
          schema:
            type: string
          description: Case-insensitive substring match on venue name.
      responses:
        '200':
          description: Page of venues.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/pageEnvelope'
                  - type: object
                    properties:
                      content:
                        type: array
                        items:
                          $ref: '#/components/schemas/venue'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      operationId: createVenue
      tags:
        - Venues
      summary: Create a new venue
      description: Creates a new venue. Requires the `admin` role.
      x-required-roles:
        - admin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/venueCreateRequest'
      responses:
        '201':
          description: Venue created.
          headers:
            Location:
              schema:
                type: string
                format: uri
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/venue'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /venues/{id}:
    parameters:
      - in: path
        name: id
        required: true
        schema:
          type: integer
          format: int64
          minimum: 1
        description: Stable numeric identifier of the venue.
    get:
      operationId: getVenueById
      tags:
        - Venues
      summary: Get a venue by id
      description: Returns the venue with the given id. Public endpoint.
      security: []
      responses:
        '200':
          description: The venue.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/venue'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    patch:
      operationId: updateVenue
      tags:
        - Venues
      summary: Partially update a venue
      description: |
        Updates fields of an existing venue. Omitted fields are left unchanged.
        Requires the `admin` role.
      x-required-roles:
        - admin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/venueUpdateRequest'
      responses:
        '200':
          description: Venue updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/venue'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalServerError'
    delete:
      operationId: deleteVenue
      tags:
        - Venues
      summary: Soft-delete a venue
      description: |
        Marks the venue as deleted (sets `deletedAt`). Existing match references
        remain intact. Requires the `admin` role.
      x-required-roles:
        - admin
      responses:
        '204':
          description: Venue deleted.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /clubs/{clubId}/teams:
    parameters:
      - in: path
        name: clubId
        required: true
        schema:
          type: integer
          format: int64
          minimum: 1
        description: Identifier of the parent club.
    get:
      operationId: listTeamsOfClub
      tags:
        - Teams
      summary: List teams of a club
      description: |
        Returns all active teams belonging to the club, ordered by category.
        Public endpoint.
      security: []
      responses:
        '200':
          description: List of teams.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/team'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      operationId: createTeam
      tags:
        - Teams
      summary: Create a team in a club
      description: |
        Creates a new team in the club. A club may have at most one active team
        per category — duplicate categories are rejected with 409. Requires the
        `admin` role.
      x-required-roles:
        - admin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/teamCreateRequest'
            example:
              category: SENIOR_M
      responses:
        '201':
          description: Team created.
          headers:
            Location:
              schema:
                type: string
                format: uri
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/team'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /teams/{id}:
    parameters:
      - in: path
        name: id
        required: true
        schema:
          type: integer
          format: int64
          minimum: 1
        description: Stable numeric identifier of the team.
    get:
      operationId: getTeamById
      tags:
        - Teams
      summary: Get a team by id
      description: Returns the team with the given id. Public endpoint.
      security: []
      responses:
        '200':
          description: The team.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/team'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    patch:
      operationId: updateTeam
      tags:
        - Teams
      summary: Partially update a team
      description: |
        Updates fields of an existing team. Currently only `category` is updatable.
        Changing the category to one that already exists for the same club is
        rejected with 409. Requires the `admin` role.
      x-required-roles:
        - admin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/teamUpdateRequest'
      responses:
        '200':
          description: Team updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/team'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalServerError'
    delete:
      operationId: deleteTeam
      tags:
        - Teams
      summary: Soft-delete a team
      description: |
        Marks the team as deleted (sets `deletedAt`). Requires the `admin` role.
      x-required-roles:
        - admin
      responses:
        '204':
          description: Team deleted.
        '401':
