            - 1
        category:
          $ref: '#/components/schemas/teamCategory'
        createdAt:
          type: string
          format: date-time
          readOnly: true
          examples:
            - '2026-05-02T10:00:00Z'
    teamCreateRequest:
      type: object
      description: |
        Payload to create a team in a club. The `clubId` comes from the path;
        only `category` is needed in the body.
      required:
        - category
      properties:
        category:
          $ref: '#/components/schemas/teamCategory'
    teamUpdateRequest:
      type: object
      description: |
        Partial update payload (PATCH). Currently only `category` is updatable.
        At least one field must be provided.
      minProperties: 1
      properties:
        category:
          $ref: '#/components/schemas/teamCategory'
    playerPosition:
      type: string
      description: |
        Player's primary position on the pitch. Coarse-grained enum aligned with
        match-sheet conventions:
          - GK: goalkeeper
          - DF: defender
          - MF: midfielder
          - FW: forward
      enum:
        - GK
        - DF
        - MF
        - FW
      examples:
