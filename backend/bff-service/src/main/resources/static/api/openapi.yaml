      operationId: updateLineupEntry
      tags:
        - Match sheets
      summary: Update a lineup entry
      description: |
        Changes the role and/or shirt number of an existing lineup entry.
        Requires `staff` or `admin`. Rejected with 409 if the sheet is locked
        or the match is in a terminal status.
      x-required-roles:
        - staff
        - admin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/lineupUpdateRequest'
      responses:
        '200':
          description: Updated lineup entry.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/lineupEntry'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
