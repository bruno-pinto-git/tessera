server:
  port: 8083

spring:
  application:
    name: statistics-service
  datasource:
    url: jdbc:postgresql://localhost:5432/tessera_statistics
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${KEYCLOAK_JWKS_URI:http://keycloak:8180/realms/tessera/protocol/openid-connect/certs}
  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:localhost}
    port: ${SPRING_RABBITMQ_PORT:5672}
    username: ${SPRING_RABBITMQ_USERNAME:tessera}
    password: ${SPRING_RABBITMQ_PASSWORD:tessera}

tessera:
  events:
    exchange: tessera.events
    match-sheet-closed-queue: stats.match-sheet-closed
    ticket-paid-queue: stats.ticket-paid
    ticket-validated-queue: stats.ticket-validated
