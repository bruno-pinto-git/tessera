spring:
  application:
    name: tessera-backend
  datasource:
    url: jdbc:postgresql://localhost:5432/tessera
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
