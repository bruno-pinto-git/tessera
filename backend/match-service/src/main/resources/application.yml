server:
  port: 8082

spring:
  application:
    name: match-service
  datasource:
    url: jdbc:postgresql://localhost:5432/tessera_matches
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
  security:
    oauth2:
      resourceserver:
        jwt:
          # Use jwk-set-uri (not issuer-uri) so we don't validate the `iss`
          # claim — Keycloak issues tokens with iss=http://localhost:8180
          # (host port) but inside Docker we reach it as http://keycloak:8180.
          jwk-set-uri: ${KEYCLOAK_JWKS_URI:http://keycloak:8180/realms/tessera/protocol/openid-connect/certs}
  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:localhost}
    port: ${SPRING_RABBITMQ_PORT:5672}
    username: ${SPRING_RABBITMQ_USERNAME:tessera}
    password: ${SPRING_RABBITMQ_PASSWORD:tessera}

# Tessera-specific config.
tessera:
  events:
    exchange: tessera.events
  seed:
    clubs:
      # DISABLED by default. Clubs on this platform are tenants (each is
      # explicitly onboarded by a platform admin and bound to a manager via
      # a Keycloak group), not a global catalogue — we don't want arbitrary
      # Wikidata entries occupying that table.
      #
      # The seeder code lives in `com.tessera.match.seed.ClubsSeeder` and
      # can be re-enabled for development by setting this to true. It still
      # skips automatically when the club table is non-empty. The PowerShell
      # equivalent for ad-hoc seeding is `scripts/seed/seed-clubs.ps1`.
      enabled: ${TESSERA_SEED_CLUBS_ENABLED:false}
      competitions: ${TESSERA_SEED_CLUBS_COMPETITIONS:Q182994,Q754488,Q13668768}
  keycloak:
    admin:
      # Used by the match-service to manage Keycloak groups/users in the
      # Tessera realm via the Admin REST API. Authenticates as the
      # `tessera-bff` service account (client_credentials grant).
      base-url: ${TESSERA_KEYCLOAK_ADMIN_BASE_URL:http://keycloak:8180}
      realm: ${TESSERA_KEYCLOAK_ADMIN_REALM:tessera}
      client-id: ${TESSERA_KEYCLOAK_ADMIN_CLIENT_ID:tessera-bff}
      client-secret: ${TESSERA_KEYCLOAK_ADMIN_CLIENT_SECRET:change-me-in-production}
