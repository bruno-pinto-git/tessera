worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile    on;
    tcp_nopush  on;

    keepalive_timeout 65;

    # -------------------------------------------------------------------------
    # Upstream definitions – one per backend service
    # -------------------------------------------------------------------------
    upstream bff {
        server bff-service:8080;
    }

    upstream keycloak {
        server keycloak:8180;
    }

    # -------------------------------------------------------------------------
    # Main server – entry point for all traffic
    # -------------------------------------------------------------------------
    server {
        listen 80;
        server_name localhost;

        # ----- API requests → BFF ----- #
        location /api/ {
            proxy_pass         http://bff;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # ----- Keycloak (auth) ----- #
        location /auth/ {
            proxy_pass         http://keycloak;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # Keycloak may send large headers (tokens)
            proxy_buffer_size        128k;
            proxy_buffers            4 256k;
            proxy_busy_buffers_size  256k;
        }

        # ----- Frontend SPA (React) ----- #
        location / {
            root  /usr/share/nginx/html;
            index index.html;

            # SPA client-side routing: fall back to index.html
            try_files $uri $uri/ /index.html;
        }
    }
}
