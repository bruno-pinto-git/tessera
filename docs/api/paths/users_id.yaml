parameters:
  - in: path
    name: id
    required: true
    schema:
      type: string
      format: uuid
    description: Keycloak user id.

get:
  operationId: getUserById
  tags: [Users]
  summary: Get a user
  description: Returns the Keycloak user with the given id.
  x-required-roles: [platform-admin]
  responses:
    "200":
      description: User.
      content:
        application/json:
          schema:
            $ref: "../components/schemas/userSummary.yaml"
    "401":
      $ref: "../components/responses/errors.yaml#/Unauthorized"
    "403":
      $ref: "../components/responses/errors.yaml#/Forbidden"
    "404":
      $ref: "../components/responses/errors.yaml#/NotFound"
    "500":
      $ref: "../components/responses/errors.yaml#/InternalServerError"

delete:
  operationId: deleteUser
  tags: [Users]
  summary: Delete a user
  description: |
    Permanently removes the user from Keycloak. Any club memberships are
    revoked at the same time (the user falls out of the corresponding
    groups). This is **not** reversible — for a temporary lock, disable
    the user from the Keycloak admin console instead.
  x-required-roles: [platform-admin]
  responses:
    "204":
      description: User deleted.
    "401":
      $ref: "../components/responses/errors.yaml#/Unauthorized"
    "403":
      $ref: "../components/responses/errors.yaml#/Forbidden"
    "404":
      $ref: "../components/responses/errors.yaml#/NotFound"
    "500":
      $ref: "../components/responses/errors.yaml#/InternalServerError"