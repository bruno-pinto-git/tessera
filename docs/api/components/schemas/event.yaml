type: object
description: |
  A sellable event — typically attached to a match — bundling the normal
  and supporter prices for that occasion.
required:
  - id
  - priceNormal
  - priceSupporter
  - status
  - createdAt
properties:
  id:
    type: integer
    format: int64
  name:
    type: [string, "null"]
  matchId:
    type: [integer, "null"]
    format: int64
    description: Optional link to a match in match-service.
  priceNormal:
    type: string
    description: Decimal string.
  priceSupporter:
    type: string
    description: Decimal string.
  status:
    type: string
    enum: [DRAFT, PUBLISHED, SALES_CLOSED, CANCELLED]
  createdAt:
    type: string
    format: date-time
