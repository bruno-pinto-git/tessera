type: object
description: Payload to create a new club. `id` and `createdAt` are server-assigned.
required:
  - name
properties:
  name:
    type: string
    minLength: 2
    maxLength: 200
    examples:
      - "SU 1.º Dezembro"
  foundedYear:
    type: [integer, "null"]
    format: int32
    minimum: 1850
    maximum: 2100
    examples:
      - 1953
  crestUrl:
    type: [string, "null"]
    format: uri
    examples:
      - "https://tessera.example/clubs/1/crest.png"
