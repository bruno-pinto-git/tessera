type: object
description: |
  Partial update payload (PATCH). Omitted fields are left unchanged.
  At least one field must be provided.
minProperties: 1
properties:
  name:
    type: string
    minLength: 2
    maxLength: 200
  foundedYear:
    type: [integer, "null"]
    format: int32
    minimum: 1850
    maximum: 2100
  crestUrl:
    type: [string, "null"]
    format: uri
