type: object
description: |
  A stadium or ground where matches are played. Soft-deleted to preserve
  historical match references.
required:
  - id
  - name
  - capacity
  - createdAt
properties:
  id:
    type: integer
    format: int64
    readOnly: true
    examples:
      - 1
  name:
    type: string
    minLength: 2
    maxLength: 200
    description: Name of the venue.
    examples:
      - "Estádio do SU 1.º Dezembro"
  capacity:
    type: integer
    format: int32
    minimum: 0
    maximum: 200000
    description: Total capacity (seated + standing).
    examples:
      - 1500
  address:
    type: [string, "null"]
    maxLength: 500
    description: Postal address of the venue.
    examples:
      - "Rua do Estádio, 2670-001 Loures"
  createdAt:
    type: string
    format: date-time
    readOnly: true
    examples:
      - "2026-05-01T10:00:00Z"
