<!doctype html>
<html lang="pt">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Tessera · 25 esquemas de cor</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, "Segoe UI", Roboto, system-ui, sans-serif;
    background: #11141a;
    color: #e8ebf0;
    padding: 28px clamp(12px, 4vw, 48px) 64px;
  }
  header { max-width: 880px; margin: 0 auto 28px; }
  h1 { font-size: 26px; font-weight: 800; letter-spacing: -0.02em; }
  header p { color: #9aa3b2; margin-top: 8px; font-size: 15px; line-height: 1.5; }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 22px;
    max-width: 1400px;
    margin: 0 auto;
  }
  .scheme {
    background: #181c24;
    border: 1px solid #262c38;
    border-radius: 18px;
    padding: 14px;
  }
  .scheme .label { display: flex; align-items: baseline; gap: 8px; margin-bottom: 10px; }
  .scheme .num {
    font-size: 12px; font-weight: 800; color: #fff;
    background: #3b4250; border-radius: 999px; padding: 2px 9px;
  }
  .scheme .name { font-size: 14px; font-weight: 600; color: #cdd3dd; }
  .scheme .kind { font-size: 11px; color: #79828f; margin-left: auto; text-transform: uppercase; letter-spacing: .06em; }

  /* phone mockup — uses CSS vars set per scheme */
  .phone {
    border-radius: 16px;
    overflow: hidden;
    border: 1px solid var(--line);
    background: var(--bg);
    color: var(--text);
  }
  .topbar {
    background: var(--surface);
    border-bottom: 1px solid var(--line);
    display: flex; align-items: center; gap: 10px;
    padding: 10px 12px;
  }
  .topbar .menu { font-size: 16px; color: var(--text); opacity: .85; }
  .topbar .title { font-size: 15px; font-weight: 700; color: var(--text); }
  .topbar .enter {
    margin-left: auto;
    background: var(--primary); color: var(--on-primary);
    font-size: 11px; font-weight: 700; padding: 5px 12px; border-radius: 999px;
  }
  .body { padding: 12px; display: flex; flex-direction: column; gap: 11px; }
  .subtitle { font-size: 11px; color: var(--muted); }
  .card {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 13px;
    padding: 12px;
    display: flex; flex-direction: column; gap: 9px;
  }
  .crests { display: flex; align-items: center; justify-content: space-between; }
  .side { display: flex; flex-direction: column; align-items: center; gap: 4px; flex: 1; }
  .crest {
    width: 38px; height: 38px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 800; color: #fff;
  }
  .crest.a { background: #2f7d46; }
  .crest.b { background: #a8542b; }
  .side .nm { font-size: 11px; font-weight: 600; color: var(--text); }
  .side .ha { font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; }
  .vs { color: var(--muted); font-size: 13px; font-weight: 700; padding: 0 6px; }
  .metaline { display: flex; gap: 6px; align-items: center; font-size: 11px; color: var(--muted); }
  .divider { height: 1px; background: var(--line); }
  .foot { display: flex; align-items: center; justify-content: space-between; }
  .badge {
    font-size: 10px; font-weight: 700; padding: 3px 9px; border-radius: 999px;
    color: var(--accent); background: color-mix(in srgb, var(--accent) 18%, transparent);
  }
  .price { font-size: 14px; font-weight: 800; color: var(--primary); }
  .btn {
    background: var(--primary); color: var(--on-primary);
    border: none; border-radius: 11px; padding: 11px; font-size: 13px; font-weight: 700;
    text-align: center;
  }
  .chips { display: flex; gap: 7px; }
  .chip {
    font-size: 11px; padding: 5px 11px; border-radius: 999px;
    border: 1px solid var(--line); color: var(--muted);
  }
  .chip.on {
    background: color-mix(in srgb, var(--primary) 22%, transparent);
    border-color: transparent; color: var(--primary); font-weight: 700;
  }
  .swatches { display: flex; gap: 6px; margin-top: 11px; }
  .sw { flex: 1; height: 26px; border-radius: 7px; border: 1px solid rgba(255,255,255,.08); }
</style>
</head>
<body>
<header>
  <h1>Tessera · 25 esquemas de cor</h1>
  <p>Cada cartão é a mesma tela (topbar, cartão de jogo, botão, chips, badge) com um esquema diferente. Os emblemas dos clubes são fixos (cor por clube) — ignora-os e foca-te no fundo, cartões, texto e cor de destaque. <strong>Diz-me o número que preferes</strong> (ou 2-3 para combinar).</p>
</header>
<div class="grid" id="grid"></div>

<script>
const S = [
  // ---- ESCUROS ----
  {n:"Glass Forest (atual)", k:"escuro", bg:"#0E1F17", su:"#182D22", li:"#2E4638", pr:"#3DDC84", op:"#06140C", tx:"#ECF3EE", mu:"#A6BBAD", ac:"#3DDC84"},
  {n:"Midnight Sky", k:"escuro", bg:"#0F172A", su:"#1E293B", li:"#334155", pr:"#38BDF8", op:"#04141F", tx:"#E2E8F0", mu:"#94A3B8", ac:"#38BDF8"},
  {n:"Carbon Teal", k:"escuro", bg:"#0D1117", su:"#161B22", li:"#30363D", pr:"#2DD4BF", op:"#04201C", tx:"#E6EDF3", mu:"#8B949E", ac:"#2DD4BF"},
  {n:"Charcoal Amber", k:"escuro", bg:"#171717", su:"#262626", li:"#404040", pr:"#F59E0B", op:"#241600", tx:"#F5F5F5", mu:"#A3A3A3", ac:"#F59E0B"},
  {n:"Deep Purple", k:"escuro", bg:"#1A1025", su:"#2A1B3D", li:"#3D2A52", pr:"#A855F7", op:"#fff", tx:"#EDE9F5", mu:"#A99FB8", ac:"#C084FC"},
  {n:"Royal Indigo", k:"escuro", bg:"#141430", su:"#20204A", li:"#2E2E5C", pr:"#818CF8", op:"#0B0B20", tx:"#E8E8F5", mu:"#9B9BC0", ac:"#818CF8"},
  {n:"Ocean Petrol", k:"escuro", bg:"#0B1E26", su:"#13303B", li:"#234653", pr:"#22D3EE", op:"#03171D", tx:"#E0F2F7", mu:"#94B5BF", ac:"#22D3EE"},
  {n:"Espresso Gold", k:"escuro", bg:"#1C1614", su:"#2A211D", li:"#3D322B", pr:"#D6A461", op:"#1C1206", tx:"#F0E9E2", mu:"#B0A296", ac:"#D6A461"},
  {n:"Crimson Night", k:"escuro", bg:"#1A0F12", su:"#2A1A1E", li:"#3D2329", pr:"#F43F5E", op:"#fff", tx:"#F5E9EB", mu:"#C0A6AB", ac:"#FB7185"},
  {n:"Graphite Orange", k:"escuro", bg:"#18181B", su:"#27272A", li:"#3F3F46", pr:"#FB923C", op:"#231100", tx:"#FAFAFA", mu:"#A1A1AA", ac:"#FB923C"},
  {n:"Forest Lime", k:"escuro", bg:"#13210F", su:"#1F3318", li:"#2F4A24", pr:"#A3E635", op:"#16280A", tx:"#ECF5E3", mu:"#A8BD9A", ac:"#A3E635"},
  {n:"Slate Rose", k:"escuro", bg:"#1E1B2E", su:"#2C2840", li:"#3E3A56", pr:"#FB7185", op:"#2A0E16", tx:"#ECE9F5", mu:"#A39FB5", ac:"#FB7185"},
  {n:"Steel Cyan", k:"escuro", bg:"#10151A", su:"#1B232B", li:"#2C3742", pr:"#56C2E6", op:"#04141C", tx:"#E7EDF2", mu:"#8FA0AD", ac:"#56C2E6"},

  // ---- CLAROS ----
  {n:"Clean Forest", k:"claro", bg:"#F4F6F3", su:"#FFFFFF", li:"#E2E8E2", pr:"#2E7D40", op:"#FFFFFF", tx:"#14241B", mu:"#5E6B62", ac:"#2E7D40"},
  {n:"Warm Paper", k:"claro", bg:"#F7F3EC", su:"#FFFFFF", li:"#E9E1D4", pr:"#15803D", op:"#FFFFFF", tx:"#1C1917", mu:"#78716C", ac:"#15803D"},
  {n:"Cool Blue", k:"claro", bg:"#F1F5F9", su:"#FFFFFF", li:"#E2E8F0", pr:"#2563EB", op:"#FFFFFF", tx:"#0F172A", mu:"#64748B", ac:"#2563EB"},
  {n:"Mint Fresh", k:"claro", bg:"#EFFAF4", su:"#FFFFFF", li:"#D6EBE0", pr:"#10B981", op:"#FFFFFF", tx:"#0F291F", mu:"#5A8273", ac:"#0E9F6E"},
  {n:"Sand Teal", k:"claro", bg:"#F5F1E8", su:"#FFFEFB", li:"#E7E0CF", pr:"#0D9488", op:"#FFFFFF", tx:"#1C1C17", mu:"#79766B", ac:"#0D9488"},
  {n:"Snow Indigo", k:"claro", bg:"#F5F5FB", su:"#FFFFFF", li:"#E5E3F0", pr:"#4F46E5", op:"#FFFFFF", tx:"#1E1B2E", mu:"#6B6880", ac:"#4F46E5"},
  {n:"Rose Light", k:"claro", bg:"#FDF2F4", su:"#FFFFFF", li:"#F3DDE2", pr:"#E11D48", op:"#FFFFFF", tx:"#2A1216", mu:"#8A6A70", ac:"#E11D48"},
  {n:"Lavender", k:"claro", bg:"#F6F4FC", su:"#FFFFFF", li:"#E8E2F5", pr:"#7C3AED", op:"#FFFFFF", tx:"#241A33", mu:"#6E6385", ac:"#7C3AED"},
  {n:"Soft Sage", k:"claro", bg:"#F0F3EE", su:"#FBFCFA", li:"#DFE6D7", pr:"#4D7C0F", op:"#FFFFFF", tx:"#1A2410", mu:"#5F6B52", ac:"#4D7C0F"},
  {n:"Cream Burgundy", k:"claro", bg:"#F8F4EE", su:"#FFFFFF", li:"#EBE0D6", pr:"#9F1239", op:"#FFFFFF", tx:"#241317", mu:"#7C6A6E", ac:"#9F1239"},
  {n:"Aqua Light", k:"claro", bg:"#ECFAFB", su:"#FFFFFF", li:"#D4EBEF", pr:"#0891B2", op:"#FFFFFF", tx:"#0C2127", mu:"#5C7A82", ac:"#0891B2"},
  {n:"Porcelain Slate", k:"claro", bg:"#F4F5F7", su:"#FFFFFF", li:"#E2E8F0", pr:"#475569", op:"#FFFFFF", tx:"#1E293B", mu:"#64748B", ac:"#0F766E"},
];

const grid = document.getElementById('grid');
S.forEach((s, i) => {
  const el = document.createElement('div');
  el.className = 'scheme';
  el.innerHTML = `
    <div class="label">
      <span class="num">${i + 1}</span>
      <span class="name">${s.n}</span>
      <span class="kind">${s.k}</span>
    </div>
    <div class="phone" style="--bg:${s.bg};--surface:${s.su};--line:${s.li};--primary:${s.pr};--on-primary:${s.op};--text:${s.tx};--muted:${s.mu};--accent:${s.ac}">
      <div class="topbar">
        <span class="menu">&#9776;</span>
        <span class="title">Jogos</span>
        <span class="enter">Entrar</span>
      </div>
      <div class="body">
        <div class="subtitle">Compra bilhetes para os próximos jogos.</div>
        <div class="card">
          <div class="crests">
            <div class="side"><div class="crest a">SB</div><div class="nm">Benfica</div><div class="ha">Casa</div></div>
            <div class="vs">vs</div>
            <div class="side"><div class="crest b">FP</div><div class="nm">Porto</div><div class="ha">Fora</div></div>
          </div>
          <div class="metaline">📅 Sáb, 16/05 · 16:00</div>
          <div class="metaline">📍 Estádio da Luz</div>
          <div class="divider"></div>
          <div class="foot"><span class="badge">Agendado</span><span class="price">10,00 €</span></div>
        </div>
        <div class="btn">Comprar bilhete</div>
        <div class="chips"><span class="chip on">Todos</span><span class="chip">Por jogar</span><span class="chip">Terminados</span></div>
      </div>
    </div>
    <div class="swatches">
      <div class="sw" style="background:${s.bg}" title="fundo"></div>
      <div class="sw" style="background:${s.su}" title="cartão"></div>
      <div class="sw" style="background:${s.pr}" title="destaque"></div>
      <div class="sw" style="background:${s.tx}" title="texto"></div>
      <div class="sw" style="background:${s.mu}" title="texto secundário"></div>
    </div>
  `;
  grid.appendChild(el);
});
</script>
</body>
</html>
