# Production overlay for a single VM, used together with the base file:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
#
# Adds Caddy (public TLS), runs Keycloak in production mode on its own Postgres
# under the /auth path, points the SPA + JWKS at the public URL, caps memory so
# the whole stack fits on a small VM, and restarts everything on reboot.
#
# Required env (see .env.prod.example), placed in a .env file next to this:
#   TESSERA_FQDN, KC_DB_PASSWORD, KC_ADMIN_PASSWORD

services:
  # ---- Public entry point: TLS + routing ----
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      TESSERA_FQDN: ${TESSERA_FQDN}
    volumes:
      - ./infra/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - nginx
      - keycloak
    networks:
      - tessera-net

  # ---- Frontend: bake the public Keycloak URL into the bundle ----
  nginx:
    restart: unless-stopped
    build:
      args:
        VITE_KEYCLOAK_URL: https://${TESSERA_FQDN}/auth

  # ---- Keycloak: production mode, Postgres-backed, behind Caddy at /auth ----
  keycloak:
    restart: unless-stopped
    command: start --import-realm
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://db-keycloak:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: ${KC_DB_PASSWORD}
      KC_HOSTNAME: https://${TESSERA_FQDN}
      KC_HTTP_RELATIVE_PATH: /auth
      KC_PROXY_HEADERS: xforwarded
      KC_HTTP_ENABLED: "true"
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KC_ADMIN_PASSWORD}
      KEYCLOAK_ADMIN_PASSWORD: ${KC_ADMIN_PASSWORD}
    mem_limit: 768m
    depends_on:
      db-keycloak:
        condition: service_healthy
    networks:
      - tessera-net

  db-keycloak:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: ${KC_DB_PASSWORD}
    volumes:
      - db-keycloak-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - tessera-net

  # ---- Backend services: resolve Keycloak JWKS under /auth + cap memory ----
  bff-service:
    restart: unless-stopped
    mem_limit: 512m

  ticket-service:
    restart: unless-stopped
    mem_limit: 512m
    environment:
      KEYCLOAK_JWKS_URI: http://keycloak:8180/auth/realms/tessera/protocol/openid-connect/certs

  match-service:
    restart: unless-stopped
    mem_limit: 512m
    environment:
      KEYCLOAK_JWKS_URI: http://keycloak:8180/auth/realms/tessera/protocol/openid-connect/certs
      TESSERA_KEYCLOAK_ADMIN_BASE_URL: http://keycloak:8180/auth

  statistics-service:
    restart: unless-stopped
    mem_limit: 512m
    environment:
      KEYCLOAK_JWKS_URI: http://keycloak:8180/auth/realms/tessera/protocol/openid-connect/certs

  rabbitmq:
    restart: unless-stopped

  db-tickets:
    restart: unless-stopped

  db-matches:
    restart: unless-stopped

  db-statistics:
    restart: unless-stopped

volumes:
  caddy-data:
  caddy-config:
  db-keycloak-data:
