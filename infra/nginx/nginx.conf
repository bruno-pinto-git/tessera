worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile    on;
    tcp_nopush  on;

    keepalive_timeout 65;

    # -------------------------------------------------------------------------
    # Upstream definitions – one per backend service
    # -------------------------------------------------------------------------
    upstream bff {
        server bff-service:8080;
    }

    # -------------------------------------------------------------------------
    # Main server – entry point for all traffic
    # -------------------------------------------------------------------------
    server {
        listen 80;
        server_name localhost;

        # ----- API requests → BFF ----- #
        location /api/ {
            proxy_pass         http://bff;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # ----- Keycloak (auth) ----- #
        # NOTE: Keycloak is NOT proxied here. The SPA reaches it directly on
        # :8180 (see frontend/.env.production: VITE_KEYCLOAK_URL), and the
        # backend services use the in-network http://keycloak:8180. Proxying
        # Keycloak's /admin/ through nginx would shadow the SPA's own /admin/*
        # routes (the React admin area), so a hard load / refresh of
        # /admin, /admin/teams, /admin/clubs/:id, etc. would hit the Keycloak
        # console instead of index.html. Keep all non-/api/ paths on the SPA.

        # ----- Hashed build assets ----- #
        # Vite fingerprints these (index-AbC123.js), so they're safe to cache
        # forever and serve immutable.
        location /assets/ {
            root    /usr/share/nginx/html;
            expires 1y;
            add_header Cache-Control "public, max-age=31536000, immutable";
        }

        # ----- Frontend SPA (React) ----- #
        location / {
            root  /usr/share/nginx/html;
            index index.html;

            # SPA client-side routing: fall back to index.html
            try_files $uri $uri/ /index.html;

            # index.html must NOT be cached, or browsers keep loading an old
            # bundle (pointing at assets that no longer exist) after a deploy.
            add_header Cache-Control "no-cache";
        }
    }
}
