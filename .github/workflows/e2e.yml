name: e2e

# End-to-end functional tests (Playwright) driven against the FULL stack brought
# up with docker compose in the runner — real Keycloak login, nginx→bff→services,
# the actual CORS/RBAC edges the @WebMvcTest suite can't reach. Complements
# backend-tests (unit/@WebMvcTest/integration), it does not replace it.
#
# Runs on push to main (the release branch) and can be dispatched manually.
# `workflow_call` lets deploy-azure.yml gate the VM deploy on this passing.

on:
  # Runnable on demand and callable by ci-main.yml (push to main) and by the
  # deploy gate. Not triggered directly on push — ci-main orchestrates main.
  workflow_dispatch:
  workflow_call:

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      # Dev-mode base compose: SPA on :8000, Keycloak (start-dev, root path) on
      # :8180 — matches the E2E defaults. The prod overlay (Caddy/TLS/FQDN) is
      # not used here.
      - name: Build & start the stack
        run: docker compose up -d --build

      - name: Wait for the stack to be ready
        run: |
          ok() { curl -fsS "$1" >/dev/null 2>&1; }
          for i in $(seq 1 90); do
            if ok http://localhost:8000/ \
               && ok http://localhost:8180/realms/tessera/.well-known/openid-configuration \
               && ok http://localhost:8000/api/v1/clubs; then
              echo "stack is up"; exit 0
            fi
            echo "waiting for stack... ($i)"; sleep 5
          done
          echo "::error::stack did not become ready in time"
          docker compose ps
          docker compose logs --tail=80
          exit 1

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps + Playwright browser
        working-directory: frontend
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Run Playwright E2E
        working-directory: frontend
        env:
          E2E_BASE_URL: http://localhost:8000
          E2E_KEYCLOAK_URL: http://localhost:8180
        run: npx playwright test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report
          if-no-files-found: ignore

      - name: Stack logs on failure
        if: failure()
        run: docker compose logs --tail=120
