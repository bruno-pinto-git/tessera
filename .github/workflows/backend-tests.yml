name: backend-tests

# Single tier: the team pushes straight to develop/main (no PR flow), so every
# push runs the FULL suite — unit + @WebMvcTest + the Testcontainers integration
# tests (-Pintegration) — plus bootJar to confirm the deployable artifact packages.
# Each backend service is an independent Gradle build, so we fan out with a matrix.
#
# `workflow_dispatch` adds a manual "Run workflow" button in the Actions tab.
# `pull_request` is kept so the same checks still run if a PR is ever opened.

on:
  push:
    # develop gets lightweight, path-filtered feedback; main is orchestrated by
    # ci-main.yml (which runs this + e2e on every push), so main is omitted here
    # to avoid a duplicate run.
    branches: [develop]
    paths:
      - "backend/**"
      - ".github/workflows/backend-tests.yml"
  pull_request:
    branches: [develop, main]
    paths:
      - "backend/**"
      - ".github/workflows/backend-tests.yml"
  workflow_dispatch:
  # Lets deploy-azure.yml gate the VM deploy on this suite passing.
  workflow_call:

jobs:
  test:
    name: test (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [bff-service, ticket-service, match-service, statistics-service]
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      # -Pintegration includes the @Tag("integration") Testcontainers tests.
      # The ubuntu-latest runner has a Docker daemon, so they run directly.
      - name: Tests (incl. integration) + coverage + bootJar
        working-directory: backend/${{ matrix.service }}
        run: |
          chmod +x ./gradlew
          ./gradlew --no-daemon test jacocoTestReport bootJar -Pintegration

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report-${{ matrix.service }}
          path: backend/${{ matrix.service }}/build/reports/tests/test
          if-no-files-found: ignore

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.service }}
          path: backend/${{ matrix.service }}/build/reports/jacoco/test
          if-no-files-found: ignore
