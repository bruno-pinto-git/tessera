name: backend-tests

# The FULL backend suite — unit + @WebMvcTest + Testcontainers integration
# (-Pintegration) + bootJar — fanned out per service with a matrix.
#
# By team preference this does NOT run on push. It runs only when:
#   - ci-main.yml calls it (on every push to main), or
#   - the deploy-azure.yml gate calls it, or
#   - it is dispatched manually.
# So develop pushes stay CI-free; the full suite runs at the main/release gate.

on:
  workflow_dispatch:
  workflow_call:

jobs:
  test:
    name: test (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [bff-service, ticket-service, match-service, statistics-service]
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      # -Pintegration includes the @Tag("integration") Testcontainers tests.
      # The ubuntu-latest runner has a Docker daemon, so they run directly.
      - name: Tests (incl. integration) + coverage + bootJar
        working-directory: backend/${{ matrix.service }}
        run: |
          chmod +x ./gradlew
          ./gradlew --no-daemon test jacocoTestReport bootJar -Pintegration

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report-${{ matrix.service }}
          path: backend/${{ matrix.service }}/build/reports/tests/test
          if-no-files-found: ignore

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.service }}
          path: backend/${{ matrix.service }}/build/reports/jacoco/test
          if-no-files-found: ignore
