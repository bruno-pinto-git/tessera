name: backend-tests

# Two tiers:
#   - Pull requests get FAST feedback: unit + @WebMvcTest only (no Docker).
#   - Pushes to the integration branches run the FULL suite (incl. the
#     Testcontainers integration tests, which need Docker) plus bootJar to
#     confirm the deployable artifact still packages.
# Each backend service is an independent Gradle build, so we fan out with a matrix.

on:
  push:
    branches: [develop, main]
    paths:
      - "backend/**"
      - ".github/workflows/backend-tests.yml"
  pull_request:
    branches: [develop, main]
    paths:
      - "backend/**"
      - ".github/workflows/backend-tests.yml"

jobs:
  # ---- Fast PR check: unit + web-slice tests (integration tag excluded) ----
  unit-tests:
    name: unit (${{ matrix.service }})
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [bff-service, ticket-service, match-service, statistics-service]
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: Unit + web tests
        working-directory: backend/${{ matrix.service }}
        run: |
          chmod +x ./gradlew
          ./gradlew --no-daemon test jacocoTestReport
      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report-${{ matrix.service }}
          path: backend/${{ matrix.service }}/build/reports/tests/test
          if-no-files-found: ignore
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.service }}
          path: backend/${{ matrix.service }}/build/reports/jacoco/test
          if-no-files-found: ignore

  # ---- Authoritative run on develop/main: full suite + deployable jar ----
  full-build:
    name: full (${{ matrix.service }})
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [bff-service, ticket-service, match-service, statistics-service]
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
      # -Pintegration includes the @Tag("integration") Testcontainers tests.
      # The ubuntu-latest runner has a Docker daemon, so they run directly.
      - name: Full tests + coverage + bootJar
        working-directory: backend/${{ matrix.service }}
        run: |
          chmod +x ./gradlew
          ./gradlew --no-daemon test jacocoTestReport bootJar -Pintegration
      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report-${{ matrix.service }}
          path: backend/${{ matrix.service }}/build/reports/tests/test
          if-no-files-found: ignore
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.service }}
          path: backend/${{ matrix.service }}/build/reports/jacoco/test
          if-no-files-found: ignore
